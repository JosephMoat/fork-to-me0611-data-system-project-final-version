version: '3.8'

services:
  backend:
    build:
      context: ./dbms_final_backend
    ports:
      - "8000:8000"
    volumes:
      - ./dbms_final_backend/sql_app.db:/app/sql_app.db
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./graduation-credit-verification-system
    ports:
      - "3000:80"
    depends_on:
      - backend
